<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Users_Module</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // When GH Pages serves a 404 (user refreshed or navigated directly),
      // this script encodes the full path into a ?/ query param and redirects
      // to the base index.html, which then restores the path via history API.
      (function () {
        var segmentsToKeep = 1; // number of path segments in the repo base (e.g. /Users-Module/)
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }());
    </script>
  </head>
  <body></body>
</html>
